<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detaylı İletişim Formu</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f2f5;
      padding: 40px 20px;
      color: #222;
    }

    /* =============================
       CONTACT CONTAINER
    ============================= */
    .contact-container {
      width: 600px;
      margin: auto;
      background-color: #ffffff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 40px;
    }

    .contact-container h1 {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 30px;
      color: #111;
    }

    /* =============================
       LABELS
    ============================= */
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    /* =============================
       INPUTS, SELECT, TEXTAREA
    ============================= */
    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="file"],
    select,
    textarea {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 20px;
      border: 1.5px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      color: #333;
      background-color: #fff;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus,
    select:focus,
    textarea:focus {
      border-color: #2563eb;
      outline: none;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    /* =============================
       RADIO & CHECKBOX GROUPS
    ============================= */
    .option-group {
      background-color: #f5f5f5;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-group label {
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      margin-bottom: 0;
    }

    .option-group input[type="radio"],
    .option-group input[type="checkbox"] {
      width: auto;
      margin-bottom: 0;
      padding: 0;
      border: none;
      accent-color: #2563eb;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    /* =============================
       FILE INPUT
    ============================= */
    input[type="file"] {
      padding: 6px 10px;
      background-color: #fff;
      cursor: pointer;
    }

    /* =============================
       BUTTONS
    ============================= */
    .button-row {
      display: flex;
      gap: 16px;
      margin-top: 10px;
    }

    .btn-submit {
      flex: 1;
      padding: 16px 24px;
      background-color: #2563eb;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-submit:hover {
      background-color: #1d4ed8;
    }

    .btn-reset {
      flex: 1;
      padding: 16px 24px;
      background-color: #dc2626;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-reset:hover {
      background-color: #b91c1c;
    }

    /* =============================
       SECTION LABEL (above groups)
    ============================= */
    .group-label {
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <div class="contact-container">
    <h1>Detaylı İletişim Formu</h1>

    <label for="ad-soyad">Ad Soyad:</label>
    <input type="text" id="ad-soyad" name="ad-soyad" placeholder="Örn: Asaf Karataş" />

    <label for="eposta">E-posta Adresi:</label>
    <input type="email" id="eposta" name="eposta" placeholder="ornek@mail.com" />

    <label for="sifre">Başvuru Takip Şifresi:</label>
    <input type="password" id="sifre" name="sifre" placeholder="Şifrenizi girin" />

    <p class="group-label">İletişim Tercihi:</p>
    <div class="option-group">
      <label>
        <input type="radio" name="iletisim" value="eposta" checked />
        Bana e-posta ile ulaşın
      </label>
      <label>
        <input type="radio" name="iletisim" value="telefon" />
        Bana telefonla ulaşın
      </label>
    </div>

    <p class="group-label">İlgi Alanları / Yetenekler:</p>
    <div class="option-group">
      <label>
        <input type="checkbox" name="yetenek" value="html" />
        HTML
      </label>
      <label>
        <input type="checkbox" name="yetenek" value="css" />
        CSS
      </label>
      <label>
        <input type="checkbox" name="yetenek" value="algoritma" />
        Algoritma
      </label>
    </div>

    <label for="konu">Konu:</label>
    <select id="konu" name="konu">
      <option value="" disabled selected>Lütfen bir konu seçin...</option>
      <option value="is-teklifi">İş Teklifi</option>
      <option value="soru">Soru</option>
      <option value="geri-bildirim">Geri Bildirim</option>
    </select>

    <label for="dosya">Özgeçmiş (CV) veya Fotoğraf Yükle:</label>
    <input type="file" id="dosya" name="dosya" />

    <label for="mesaj">Mesajınız:</label>
    <textarea id="mesaj" name="mesaj" placeholder="Detaylı mesajınızı buraya yazabilirsiniz..."></textarea>

    <div class="button-row">
      <button type="submit" class="btn-submit">Gönder</button>
      <button type="reset" class="btn-reset">Temizle</button>
    </div>
  </div>

</body>
</html>
